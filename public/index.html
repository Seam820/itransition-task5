<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonicStream - Premium Music Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <style>
        :root {
            --bg-main: #07090F;
            --bg-glass: rgba(21, 29, 48, 0.65);
            --bg-input: rgba(30, 41, 66, 0.8);
            --accent-glow: #00F2FE;
            --accent-blue: #4FACFE;
            --accent-purple: #9B51E0;
            --accent-like: #FF3366;
            --text-primary: #FFFFFF;
            --text-secondary: #94A3B8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            padding: 40px 5%; 
            margin: 0;
            min-height: 100vh;
            color: var(--text-primary);
            background: linear-gradient(-45deg, #07090f, #131a2f, #0a0f1c, #1a1025);
            background-size: 400% 400%;
            animation: ambientGlow 15s ease infinite;
            position: relative;
            z-index: 1;
            overflow-x: hidden;
        }

        body::before, body::after {
            content: "";
            position: fixed;
            width: 70vw;
            height: 70vw;
            border-radius: 50%;
            z-index: -1;
            filter: blur(120px);
            opacity: 0.5;
            animation: floatOrb 25s infinite ease-in-out alternate;
        }

        body::before { background: rgba(0, 242, 254, 0.12); top: -20%; left: -10%; }
        body::after { background: rgba(155, 81, 224, 0.12); bottom: -20%; right: -10%; animation-delay: -12.5s; }

        h2, h3, h4 { margin: 0; font-weight: 600; letter-spacing: -0.5px; }

        /* Glassmorphism Configuration Controls Toolbar */
        .toolbar { 
            display: flex; 
            flex-wrap: wrap;
            gap: 20px; 
            align-items: flex-end; 
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 24px 32px; 
            border-radius: 20px; 
            margin-bottom: 35px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
        }

        .toolbar div { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 150px;}
        .toolbar label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-secondary); }
        
        .toolbar select, .toolbar input {
            background-color: var(--bg-input);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }
        .toolbar select:focus, .toolbar input:focus { 
            border-color: var(--accent-glow); 
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
            background-color: rgba(30, 41, 66, 1);
        }

        #randomSeedBtn {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-glow));
            border: none; color: #000; padding: 12px 24px; font-weight: 800;
            border-radius: 10px; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
            font-family: 'Poppins', sans-serif;
        }
        #randomSeedBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5); }

        .view-toggle { 
            margin-bottom: 30px; 
            display: inline-flex; 
            background: var(--bg-glass); 
            padding: 8px; 
            border-radius: 12px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }
        .view-toggle label { 
            padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px;
            color: var(--text-secondary); transition: all 0.3s ease;
        }
        .view-toggle input { display: none; }
        .view-toggle label:has(input:checked) {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        /* Responsive Table Structural Architecture */
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        th { padding: 0 20px 10px 20px; text-align: left; color: var(--text-secondary); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid var(--border-color);}
        td { padding: 18px 20px; background-color: var(--bg-glass); backdrop-filter: blur(5px); }
        tr td:first-child { border-radius: 16px 0 0 16px; border-left: 1px solid var(--border-color); }
        tr td:last-child { border-radius: 0 16px 16px 0; border-right: 1px solid var(--border-color); }
        tr td { border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); }
        
        tbody tr:not(.detail-row) { transition: all 0.3s ease; animation: slideUp 0.4s ease forwards; opacity: 0; transform: translateY(10px); }
        tbody tr:not(.detail-row):hover { transform: scale(1.01) translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.4); background-color: rgba(30, 41, 66, 0.9); z-index: 10; position: relative;}

        /* Premium Dynamic Hearts Metric Like Components */
        .premium-like-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 51, 102, 0.08);
            border: 1px solid rgba(255, 51, 102, 0.25);
            color: #FF4D7D;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
        }
        .premium-like-badge:hover {
            background: rgba(255, 51, 102, 0.2);
            border-color: rgba(255, 51, 102, 0.5);
            transform: scale(1.06);
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.3);
            color: #FF7597;
        }
        .premium-like-badge svg { fill: currentColor; transition: transform 0.3s ease; }
        .premium-like-badge:hover svg { transform: scale(1.15); }

        /* Dynamic Expand Player Segment Blocks */
        .detail-row td { background: linear-gradient(to right, rgba(17, 23, 38, 0.95), rgba(21, 29, 48, 0.95)); border-radius: 16px; padding: 0; border: none !important; }
        .detail-container { display: flex; gap: 35px; padding: 30px; align-items: center; border-left: 4px solid var(--accent-purple); border-radius: 16px;}

        .expand-btn {
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent-purple), #E06BF0);
            color: white; border: none; padding: 12px 28px; border-radius: 30px;
            font-weight: 600; font-family: 'Poppins', sans-serif; font-size: 14px;
            box-shadow: 0 4px 15px rgba(155, 81, 224, 0.3); transition: all 0.3s ease;
        }
        .expand-btn:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(155, 81, 224, 0.5); }

        /* Micro-Layout Container Architecture for Multi-Genre Badges */
        .genre-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-width: 240px; 
        }

        .genre-badge {
            display: inline-block;
            background: rgba(0, 242, 254, 0.08); 
            border: 1px solid rgba(0, 242, 254, 0.25);
            color: var(--accent-glow); 
            padding: 4px 10px; 
            border-radius: 12px; 
            font-size: 11px; 
            font-weight: 600; 
            letter-spacing: 0.3px;
            white-space: nowrap;
            text-transform: capitalize;
        }

        /* Album Artwork Grid Cards */
        .gallery-card {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 16px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; justify-content: space-between;
            animation: slideUp 0.5s ease forwards; opacity: 0; transform: translateY(20px);
        }
        .gallery-card:hover { 
            transform: translateY(-8px) scale(1.02); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .img-container { position: relative; overflow: hidden; border-radius: 14px; margin-bottom: 16px; }
        .gallery-img { width: 100%; height: 220px; object-fit: cover; transition: transform 0.5s ease; }
        .gallery-card:hover .gallery-img { transform: scale(1.08); }

        #pagination-controls { margin-top: 35px; display: flex; gap: 20px; align-items: center; justify-content: center;}
        #pagination-controls button {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); color: var(--text-primary);
            padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif; backdrop-filter: blur(5px);
        }
        #pagination-controls button:not(:disabled):hover { background: rgba(255, 255, 255, 0.1); border-color: var(--text-primary); transform: translateY(-2px); }
        #pagination-controls button:disabled { opacity: 0.3; cursor: not-allowed; }

        @keyframes ambientGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(8%, 12%) scale(1.3); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <div>
            <label for="region">Localization</label>
            <select id="region">
                <option value="en-US">English (USA)</option>
                <option value="de-DE">German (Germany)</option>
            </select>
        </div>
        <div>
            <label for="seed">Generation Seed</label>
            <input type="number" id="seed" value="42">
        </div>
        <div>
            <label for="likes">Target Likes (Avg)</label>
            <input type="number" id="likes" step="0.1" min="0" max="10" value="0">
        </div>
        <button id="randomSeedBtn">🎲 Roll Random</button>
    </div>

    <div class="view-toggle">
        <label><input type="radio" name="view" value="table" checked> 📊 Table View</label>
        <label><input type="radio" name="view" value="gallery"> 🎨 Card Studio</label>
    </div>

    <div id="data-container">
        <div id="table-view">
            <table>
                <thead>
                    <tr><th># ID</th><th>Song Title</th><th>Lead Artist</th><th>Album Collection</th><th style="width: 250px;">Genre Profile</th><th style="white-space: nowrap; width: 1%;">Metric Likes</th></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
            <div id="pagination-controls">
                <button id="prevBtn" disabled>◀ Back</button>
                <span id="pageIndicator" style="font-weight: 600; color: var(--text-primary); background: var(--bg-glass); padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border-color);">Page 1</span>
                <button id="nextBtn">Next ▶</button>
            </div>
        </div>

        <div id="gallery-view" style="display: none; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px;"></div>
        <div id="scroll-sentinel" style="height: 40px; display: none;"></div>
    </div>

    <script>
        const regionInput = document.getElementById('region');
        const seedInput = document.getElementById('seed');
        const likesInput = document.getElementById('likes');
        const randomSeedBtn = document.getElementById('randomSeedBtn');
        const tableBody = document.getElementById('table-body');
        const galleryView = document.getElementById('gallery-view');
        const tableView = document.getElementById('table-view');
        const viewRadios = document.getElementsByName('view');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageIndicator = document.getElementById('pageIndicator');
        const scrollSentinel = document.getElementById('scroll-sentinel');

        let currentPage = 1;
        let currentMode = 'table';
        let isLoading = false;

        const heartSvgIcon = `
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
        `;

        function buildGenreBadgesHTML(genreString) {
            if (!genreString) return '';
            return `<div class="genre-container">` + 
                genreString.split(',')
                           .map(g => g.trim())
                           .filter(g => g.length > 0)
                           .map(g => `<span class="genre-badge">${g}</span>`)
                           .join('') + 
                `</div>`;
        }

        async function fetchSongs(append = false) {
            if (isLoading) return;
            isLoading = true;
            const region = regionInput.value;
            const seed = seedInput.value;
            const likes = likesInput.value;
            
            try {
                const response = await fetch(`/api/songs?region=${region}&seed=${seed}&page=${currentPage}&likes=${likes}`);
                const data = await response.json();
                
                if (currentMode === 'table') renderTable(data);
                else renderGallery(data, append);
                
                pageIndicator.innerText = `Page ${currentPage}`;
                prevBtn.disabled = currentPage === 1;
            } catch (err) {
                console.error("Error communicating with store microservice:", err);
            } finally {
                isLoading = false;
            }
        }

        function renderTable(songs) {
            tableBody.innerHTML = '';
            songs.forEach((song, index) => {
                const tr = document.createElement('tr');
                tr.style.cursor = 'pointer';
                tr.style.animationDelay = `${index * 0.03}s`;
                tr.innerHTML = `
                    <td style="color: var(--accent-glow); font-weight: 800;">${song.index}</td>
                    <td><span style="font-size: 15px; font-weight:600;">${song.title}</span></td>
                    <td style="color: var(--text-secondary);">${song.artist}</td>
                    <td style="color: var(--text-secondary); font-style: italic;">${song.album}</td>
                    <td>${buildGenreBadgesHTML(song.genre)}</td>
                    <td style="white-space: nowrap; width: 1%;">
                        <div class="premium-like-badge">
                            ${heartSvgIcon}
                            <span>${song.likes}</span>
                        </div>
                    </td>
                `;
                
                const detailTr = document.createElement('tr');
                detailTr.className = 'detail-row';
                detailTr.style.display = 'none';
                
                const imageSeed = encodeURIComponent(song.title + song.artist + song.index);
                const encodedTitle = encodeURIComponent(song.title);
                const encodedArtist = encodeURIComponent(song.artist);
                const coverUrl = `/api/cover?seed=${imageSeed}&title=${encodedTitle}&artist=${encodedArtist}`;
                const songJson = JSON.stringify(song).replace(/"/g, '&quot;');

                detailTr.innerHTML = `
                    <td colspan="6">
                        <div class="detail-container">
                            <img src="${coverUrl}" style="width: 160px; height: 160px; border-radius: 14px; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.6);">
                            <div style="flex: 1;">
                                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;">
                                    <h3 style="font-size: 24px;">${song.title}</h3>
                                    <div class="premium-like-badge" style="transform: scale(1.15); margin-right: 10px;">
                                        ${heartSvgIcon}
                                        <span>${song.likes}</span>
                                    </div>
                                </div>
                                <p style="margin: 0 0 14px 0; color: var(--text-secondary); font-size: 14px;">By <strong style="color:white;">${song.artist}</strong> • Featured in <i>${song.album}</i></p>
                                <div style="margin-bottom: 20px;">${buildGenreBadgesHTML(song.genre)}</div>
                                <button class="expand-btn" onclick="playProceduralMusic(${songJson})">▶ Synthesize Studio Audio</button>
                                <p style="margin-top: 20px; font-style: italic; color: #E2E8F0; background: rgba(255,255,255,0.05); padding: 14px 20px; border-radius: 8px; font-size: 13px; line-height: 1.5;">
                                    "${song.review || 'No review available.'}"
                                </p>
                            </div>
                        </div>
                    </td>
                `;

                tr.addEventListener('click', () => {
                    const isOpen = detailTr.style.display === 'table-row';
                    detailTr.style.display = isOpen ? 'none' : 'table-row';
                });
                tableBody.appendChild(tr);
                tableBody.appendChild(detailTr);
            });
        }

        function renderGallery(songs, append) {
            if (!append) galleryView.innerHTML = '';
            songs.forEach((song, index) => {
                const card = document.createElement('div');
                card.className = 'gallery-card';
                card.style.animationDelay = `${(index % 20) * 0.05}s`;
                
                const imageSeed = encodeURIComponent(song.title + song.artist + song.index);
                const encodedTitle = encodeURIComponent(song.title);
                const encodedArtist = encodeURIComponent(song.artist);
                const coverUrl = `/api/cover?seed=${imageSeed}&title=${encodedTitle}&artist=${encodedArtist}`;
                const songJson = JSON.stringify(song).replace(/"/g, '&quot;');

                card.innerHTML = `
                    <div>
                        <div class="img-container">
                            <img src="${coverUrl}" class="gallery-img" alt="Cover art">
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 8px;">
                            <strong style="font-size: 17px; max-width: 80%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${song.title}</strong>
                            <span style="font-size: 13px; font-weight: 800; color: var(--accent-glow);">#${song.index}</span>
                        </div>
                        <small style="color: var(--text-secondary); display:block; margin-bottom: 12px; font-size: 13px;">${song.artist}</small>
                        <div style="margin: 16px 0 12px 0; display:flex; justify-content: space-between; align-items:center; gap: 10px;">
                            ${buildGenreBadgesHTML(song.genre)}
                            <div class="premium-like-badge">
                                ${heartSvgIcon}
                                <span>${song.likes}</span>
                            </div>
                        </div>
                        <p style="margin: 12px 0; font-size: 13px; font-style: italic; color: #94A3B8; line-height:1.5;">"${song.review || 'No review available.'}"</p>
                    </div>
                    <div style="margin-top: auto; padding-top: 16px;">
                        <button class="expand-btn" style="width: 100%; justify-content: center; border-radius: 12px;" onclick="playProceduralMusic(${songJson})">▶ Play Audio</button>
                    </div>
                `;
                galleryView.appendChild(card);
            });
        }

        async function playProceduralMusic(song) {
            await Tone.start();
            let scale = ["C4", "D4", "E4", "G4", "A4", "C5"]; 
            let synthType = "synth"; 
            const genreLower = (song.genre || "").toLowerCase();

            if (genreLower.includes("pop") || genreLower.includes("electronic") || genreLower.includes("dance")) {
                scale = ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5"];
                synthType = "amSynth";
            } else if (genreLower.includes("rock") || genreLower.includes("metal") || genreLower.includes("indie")) {
                scale = ["A3", "B3", "C4", "D4", "E4", "F4", "G4", "A4"];
                synthType = "duoSynth";
            } else if (genreLower.includes("jazz") || genreLower.includes("blues") || genreLower.includes("soul")) {
                scale = ["A3", "C4", "D4", "E4", "G4", "A4", "C5"];
                synthType = "fmSynth";
            }

            const reverb = new Tone.Reverb({ decay: 2.5, wet: 0.35 }).toDestination();
            const delay = new Tone.FeedbackDelay({ delayTime: "8n", feedback: 0.25, wet: 0.2 }).connect(reverb);

            let synth;
            if (synthType === "amSynth") synth = new Tone.AMSynth().connect(delay);
            else if (synthType === "duoSynth") {
                synth = new Tone.DuoSynth().connect(delay);
                synth.voice0.oscillator.type = "sawtooth";
            } else if (synthType === "fmSynth") synth = new Tone.FMSynth().connect(delay);
            else synth = new Tone.PolySynth(Tone.Synth).connect(delay);

            synth.volume.value = -6; 

            const rng = new Math.seedrandom(song.index + song.title); 
            const melodyPattern = [];
            for (let i = 0; i < 16; i++) {
                if (rng() < 0.3) melodyPattern.push(null);
                else melodyPattern.push(scale[Math.floor(rng() * scale.length)]);
            }

            const sequence = new Tone.Sequence((time, note) => {
                if (note) {
                    const duration = rng() > 0.5 ? "8n" : "16n";
                    synth.triggerAttackRelease(note, duration, time);
                }
            }, melodyPattern, "8n");

            Tone.Transport.cancel();
            Tone.Transport.bpm.value = 110 + Math.floor(rng() * 30);
            Tone.Transport.start();
            sequence.start(0);
            
            setTimeout(() => {
                sequence.stop();
                Tone.Transport.stop();
                sequence.dispose();
                synth.dispose();
                delay.dispose();
                reverb.dispose();
            }, 5000);
        }

        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && currentMode === 'gallery' && !isLoading) {
                currentPage++;
                fetchSongs(true);
            }
        }, { rootMargin: '100px' });
        observer.observe(scrollSentinel);

        viewRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                currentMode = e.target.value;
                currentPage = 1; 
                if (currentMode === 'table') {
                    tableView.style.display = 'block'; galleryView.style.display = 'none'; scrollSentinel.style.display = 'none';
                } else {
                    tableView.style.display = 'none'; galleryView.style.display = 'grid'; scrollSentinel.style.display = 'block'; window.scrollTo(0, 0);
                }
                fetchSongs();
            });
        });

        nextBtn.addEventListener('click', () => { currentPage++; fetchSongs(); });
        prevBtn.addEventListener('click', () => { if (currentPage > 1) { currentPage--; fetchSongs(); } });

        const resetAndFetch = () => { 
            currentPage = 1; 
            if (currentMode === 'gallery') {
                window.scrollTo(0, 0);
                fetchSongs(false); 
            } else {
                fetchSongs();
            }
        };

        regionInput.addEventListener('change', resetAndFetch);
        seedInput.addEventListener('input', resetAndFetch);
        likesInput.addEventListener('input', resetAndFetch); 

        randomSeedBtn.addEventListener('click', () => { seedInput.value = Math.floor(Math.random() * 1000000); resetAndFetch(); });

        fetchSongs();
    </script>
</body>
</html>
